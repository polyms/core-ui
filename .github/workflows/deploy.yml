name: Build and Deploy

on:
  push:
    tags:
      - 'core@*'
  pull_request:

env:
  NODE_VERSION: '24'

permissions:
  contents: read
  packages: write

jobs:
  pr-affected:
    name: 'Build and test affected apps on Pull Requests'
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      # Lockfile must exist before pnpm/action-setup can hash it for the store cache key.
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # setup-node only installs Node; pnpm store cache is handled by pnpm/action-setup.
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run affected tasks
        run: |
          pnpm check
          pnpm nx affected --base=origin/${{ github.base_ref }} -t test build
        env:
          NX_BRANCH: ${{ github.event.pull_request.number }}

  build-and-deploy:
    name: 'Build and test'
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/core@')
    runs-on: ubuntu-latest
    # environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run affected tasks
        id: build
        env:
          NX_BRANCH: ${{ github.ref_name }}
        run: |
          pnpm check
          pnpm nx affected -t build --base=HEAD~1
          echo "pkg_index=$(node -p "require('./dist/core/.vite/manifest.json')['src/index.ts'].file")" >> $GITHUB_OUTPUT
          echo "pkg_style=$(node -p "require('./dist/core/.vite/manifest.json')['src/styles/tailwind.css'].file")" >> $GITHUB_OUTPUT

      - name: Package and prepare artifacts
        run: |
          mkdir -p dist/mfe
          mv dist/core/*.css dist/mfe/
          mv dist/core/.vite/ dist/mfe/

      - name: Publish to GitHub Packages
        run: |
          echo "@polyms:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
          echo "always-auth=true" >> .npmrc
          pnpm publish dist/core --no-git-checks
